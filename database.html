<!DOCTYPE html>
<html lang="en">

  <head>
    
    <!-- Privacy-friendly analytics by Plausible -->
    <script async src="https://plausible.io/js/pa-Uznc0bkCdpH_Eb_EsUSMR.js"></script>
    <script defer
      data-domain="minsight.org"
      data-api="/api/event"
      src="/js/script.file-downloads.js">
      window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
      plausible.init()
      


    </script>

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">

    <title>MinSight - Rapid spectroscopy data fitting and intepreration</title>

    <!-- <link rel="stylesheet" type="text/css" href="css/dropdown.css"> -->
    <link rel="stylesheet" type="text/css" href="css/db.css">
    <link rel="stylesheet" type="text/css" href="css/nav.css">

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="UTF-8" />

  </head>

<body class="search-centered">

  <div id="nav-placeholder"></div>

  <!-- <div id="navbar"></div> <script> fetch("navbar.html") .then(response => response.text()) .then(data => { document.getElementById("navbar").innerHTML = data; }); </script> -->
  
  <div id="search-wrapper">

    <h1 class="db-title">Explore the MinSight database</h1>
    <p class="db-subtitle">
      Find published Mössbauer hyperfine parameters and see their corresponding spectra.
    </p>

    <!-- Search bar -->

    <div class="search-row">

      <div class="search-container">
        <input
          id="search"
          type="text"
          placeholder="Search Fe-bearing phase (e.g. Goethite, Magnetite...)"
          autocomplete="off"
        />

        <button id="clear-btn" title="Clear search">✕</button>
        <button id="search-btn" title="Search">🔍︎</button>

        <div id="autocomplete"></div>
      </div>

      <span id="result-count" class="result-count"></span>

    </div>

    <div id="mineral-highlight"></div>
    
    <!-- Filters header: button + chips -->
    <div class="filters-header">
      <button id="toggle-filters" class="filters-toggle">
        ▾ Search by parameters
      </button>
      <div id="active-filters" class="active-filters"></div>
    </div>



    <!-- Collapsible filters panel (ALL fields INSIDE) -->
    <div id="filters-panel" class="filters-panel">

      <div class="filter-row">
        <label>Temp [K]</label>
        <input id="temp-min" type="number" placeholder="min" inputmode="decimal">
        <span>–</span>
        <input id="temp-max" type="number" placeholder="max" inputmode="decimal">
      </div>

      <div class="filter-row">
        <label>IS [mm/s]</label>
        <input id="is-min" type="number" step="0.01" placeholder="min" inputmode="decimal">
        <span>–</span>
        <input id="is-max" type="number" step="0.01" placeholder="max" inputmode="decimal">
      </div>

      <div class="filter-row">
        <label>QS [mm/s]</label>
        <input id="qs-min" type="number" step="0.01" placeholder="min" inputmode="decimal">
        <span>–</span>
        <input id="qs-max" type="number" step="0.01" placeholder="max" inputmode="decimal">
      </div>

      <div class="filter-row">
        <label>Bhf [T]</label>
        <input id="bhf-min" type="number" step="0.1" placeholder="min" inputmode="decimal">
        <span>–</span>
        <input id="bhf-max" type="number" step="0.1" placeholder="max" inputmode="decimal">
      </div>

      <!-- <div class="filter-actions">
        <button id="clear-filters">Clear filters</button>
      </div> -->

    </div>

    <!-- Messages -->
    <p id="result-count"></p>
    <p id="no-results">No results found.</p>

  </div>

<!-- 
  <div id="mini-spectrum">
<svg width="500" height="150" viewBox="0 0 500 150"></svg>
</div> -->

  <div id="results-cards"></div>

  <table id="results"></table>


<script src="js/db.js?v=20260427"></script>
<script src="js/site.js"></script>

</body>
</html>
